<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Course Remarks Update</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: "Inter", sans-serif;
            background: #f1f3f5;
            margin: 0;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .nav-item {
            display: block;
            padding: 10px 0;
            color: white;
            text-decoration: none;
        }

        .nav-item.active {
            font-weight: 700;
        }

        /* Main */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: white;
            padding: 20px;
            border-bottom: 1px solid #ddd;
        }

        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        /* Card */
        .form-card {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .section {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .section-title {
            font-weight: 600;
            margin-bottom: 12px;
            border-bottom: 1px solid #ccc;
            padding-bottom: 5px;
        }

        textarea {
            width: 100%;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
            min-height: 70px;
            font-family: "Inter", sans-serif;
            box-sizing: border-box;
        }

        .radio-group {
            display: flex;
            gap: 20px;
        }

        .btn-primary {
            background: #1b4332;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-family: "Inter", sans-serif;
            font-weight: 600;
        }

        .btn-primary:hover {
            background: #2d6a4f;
        }

        /* Search styles */
        #personnelSearch {
            width: 100%;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-family: "Inter", sans-serif;
            box-sizing: border-box;
        }

        .recommendation-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 1000;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .recommendation-item {
            padding: 10px 12px;
            cursor: pointer;
            border-bottom: 1px solid #f3f4f6;
        }

        .recommendation-item:hover {
            background: #f3f4f6;
        }

        .recommendation-item .army-no {
            font-weight: 600;
            color: #1b4332;
        }

        .recommendation-loading {
            padding: 10px 12px;
            text-align: center;
            color: #6b7280;
        }

        #selectedPersonnelInfo {
            margin-top: 10px;
            padding: 8px;
            background: #e8f0fe;
            border-radius: 5px;
            display: none;
            border-left: 3px solid #1b4332;
        }

        .search-container {
            position: relative;
            width: 100%;
        }
    </style>

    <link rel="stylesheet" href="sidebar.css">
</head>

<body>

<div class="container">
    <script src="sidebar.js"></script>
    <aside class="sidebar" id="sidebarContainer">
        <div style="color: white; padding: 20px; text-align: center;">
            Loading menu...
        </div>
    </aside>

    <!-- MAIN -->
    <main class="main-content">
        <div class="content-area">
            <div class="form-card">
                <div class="header">
                    <h2>Course Remarks Update</h2>
                    <p>Update remarks before and after course detailment</p>
                </div>

                <!-- SELECT PERSONNEL -->
                <div class="section">
                    <div class="section-title">Select Personnel</div>
                    <div class="search-container">
                        <input
                                type="text"
                                id="personnelSearch"
                                placeholder="Search by Army Number (min 4 characters)..."
                                autocomplete="off"
                        >
                        <div id="searchResults" class="recommendation-dropdown" style="display: none;"></div>
                    </div>
                    <div id="selectedPersonnelInfo"></div>
                    <input type="hidden" id="selectedPersonnelId">
                </div>

                <!-- BEFORE DETAILMENT -->
                <div class="section">
                    <div class="section-title">Before Detailment</div>
                    <div class="radio-group">
                        <label>
                            <input type="radio" name="before" value="Volunteer">
                            Volunteer
                        </label>
                        <label>
                            <input type="radio" name="before" value="NotDetail">
                            Not to Detail
                        </label>
                    </div>

                    <div id="notDetailReason" style="display:none;margin-top:10px;">
                        <textarea id="beforeReason" placeholder="Reason for not detailing"></textarea>
                    </div>
                </div>

                <!-- AFTER DETAILMENT -->
                <div class="section">
                    <div class="section-title">After Detailment</div>
                    <div class="radio-group">
                        <label>
                            <input type="radio" name="after" value="TakenOff">
                            Taken Off
                        </label>
                        <label>
                            <input type="radio" name="after" value="Continuing">
                            Continuing
                        </label>
                    </div>

                    <div id="takenOffReason" style="display:none;margin-top:10px;">
                        <textarea id="afterReason" placeholder="Reason for taken off"></textarea>
                    </div>
                </div>

                <!-- GENERAL REMARK -->
                <div class="section">
                    <div class="section-title">General Remarks</div>
                    <textarea id="generalRemarks" placeholder="General remarks"></textarea>
                </div>

                <div style="text-align:right;">
                    <button class="btn-primary" onclick="saveRemarks()">Update Remarks</button>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    // ==================== CONFIGURATION ====================
    const BASE_URL = "http://localhost:6060";
    const SEARCH_API = `${BASE_URL}/api/personnel/search`;
    const REMARKS_API = `${BASE_URL}/api/remarks/save`;

    // ==================== DOM ELEMENTS ====================
    const searchInput = document.getElementById('personnelSearch');
    const searchResults = document.getElementById('searchResults');
    const selectedPersonnelInfo = document.getElementById('selectedPersonnelInfo');
    const selectedPersonnelId = document.getElementById('selectedPersonnelId');

    // ==================== STATE ====================
    let selectedPersonnel = null;
    let searchTimeout = null;
    let abortController = null;

    // ==================== SEARCH FUNCTION ====================
    if (searchInput) {
        searchInput.addEventListener("input", (e) => {
            const searchTerm = e.target.value.trim();
            selectedPersonnelId.value = "";
            selectedPersonnel = null;

            clearTimeout(searchTimeout);

            if (searchTerm.length < 4) {
                searchResults.style.display = "none";
                selectedPersonnelInfo.style.display = "none";
                return;
            }

            searchTimeout = setTimeout(() => {
                searchPersonnel(searchTerm);
            }, 500);
        });
    }

    async function searchPersonnel(term) {
        if (abortController) abortController.abort();
        abortController = new AbortController();

        try {
            searchResults.innerHTML = '<div class="recommendation-loading">Searching personnel...</div>';
            searchResults.style.display = "block";

            console.log('🔍 Searching for:', term);
            const response = await fetch(`${SEARCH_API}?term=${encodeURIComponent(term)}`, {
                signal: abortController.signal
            });

            const result = await response.json();
            console.log('📦 Response:', result);

            if (result.success && result.data && result.data.length > 0) {
                displaySearchResults(result.data);
            } else {
                searchResults.innerHTML = `
                    <div class="recommendation-loading" style="color: #ef4444;">
                        ⚠️ No personnel found with Army No: "${term}"
                    </div>
                `;
            }
        } catch (error) {
            if (error.name === "AbortError") return;
            console.error("Search error:", error);
            searchResults.style.display = "none";
        }
    }

    function displaySearchResults(personnelList) {
        let html = "";
        personnelList.forEach(person => {
            html += `
                <div class="recommendation-item" onclick="selectPersonnel(${person.id}, '${person.armyNo}', '${person.fullName}', '${person.rank || ''}')">
                    <div class="army-no">${person.armyNo}</div>
                    <div style="font-size: 12px; color: #4b5563;">${person.fullName} ${person.rank ? '- ' + person.rank : ''}</div>
                </div>
            `;
        });
        searchResults.innerHTML = html;
    }

    // ==================== SELECT PERSONNEL ====================
    window.selectPersonnel = function(personnelId, armyNo, fullName, rank) {
        console.log('✅ Selected:', {personnelId, armyNo, fullName, rank});

        searchInput.value = `${fullName} (${armyNo})`;
        selectedPersonnelId.value = personnelId;

        selectedPersonnel = {
            id: personnelId,
            armyNo: armyNo,
            fullName: fullName,
            rank: rank
        };

        searchResults.style.display = "none";

        selectedPersonnelInfo.style.display = "block";
        selectedPersonnelInfo.innerHTML = `
            <strong>Selected:</strong> ${fullName} (${armyNo}) ${rank ? '- ' + rank : ''}
        `;
    };

    // ==================== CLICK OUTSIDE ====================
    document.addEventListener("click", (e) => {
        if (searchInput && !searchInput.contains(e.target) && searchResults && !searchResults.contains(e.target)) {
            searchResults.style.display = "none";
        }
    });

    // ==================== SAVE REMARKS ====================
    window.saveRemarks = function() {
        if (!selectedPersonnel) {
            alert("Please select personnel");
            return;
        }

        const beforeRadio = document.querySelector('input[name="before"]:checked');
        if (!beforeRadio) {
            alert("Please select Before Detailment");
            return;
        }

        const afterRadio = document.querySelector('input[name="after"]:checked');
        if (!afterRadio) {
            alert("Please select After Detailment");
            return;
        }

        let beforeReason = '';
        if (beforeRadio.value === 'NotDetail') {
            beforeReason = document.getElementById('beforeReason').value.trim();
        }

        let afterReason = '';
        if (afterRadio.value === 'TakenOff') {
            afterReason = document.getElementById('afterReason').value.trim();
        }

        const generalRemarks = document.getElementById("generalRemarks").value.trim();

        const payload = {
            personnelId: selectedPersonnel.id,
            beforeDetailment: beforeRadio.value,
            afterDetailment: afterRadio.value,
            beforeReason: beforeReason,
            afterReason: afterReason,
            generalRemarks: generalRemarks
        };

        console.log("📤 Sending:", payload);

        fetch(REMARKS_API, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        })
        .then(res => res.json())
        .then(data => {
            alert("Remarks updated successfully ✅");
            console.log("✅ Saved:", data);
            clearForm();
        })
        .catch(error => {
            console.error("❌ Error:", error);
            alert("Error saving remarks ❌");
        });
    };

    // ==================== CLEAR FORM ====================
    function clearForm() {
        if (searchInput) searchInput.value = '';
        selectedPersonnel = null;
        if (selectedPersonnelId) selectedPersonnelId.value = '';
        if (selectedPersonnelInfo) selectedPersonnelInfo.style.display = 'none';
        if (searchResults) searchResults.style.display = 'none';

        document.querySelectorAll('input[name="before"]').forEach(r => r.checked = false);
        document.querySelectorAll('input[name="after"]').forEach(r => r.checked = false);

        const generalRemarks = document.getElementById('generalRemarks');
        if (generalRemarks) generalRemarks.value = '';

        const beforeReason = document.getElementById('beforeReason');
        if (beforeReason) beforeReason.value = '';

        const afterReason = document.getElementById('afterReason');
        if (afterReason) afterReason.value = '';

        const notDetailReason = document.getElementById('notDetailReason');
        if (notDetailReason) notDetailReason.style.display = 'none';

        const takenOffReason = document.getElementById('takenOffReason');
        if (takenOffReason) takenOffReason.style.display = 'none';
    }

    // ==================== RADIO BUTTON LOGIC ====================
    document.querySelectorAll('input[name="before"]').forEach(radio => {
        radio.addEventListener('change', function() {
            const notDetailReason = document.getElementById('notDetailReason');
            if (notDetailReason) {
                notDetailReason.style.display = this.value === 'NotDetail' ? 'block' : 'none';
            }
        });
    });

    document.querySelectorAll('input[name="after"]').forEach(radio => {
        radio.addEventListener('change', function() {
            const takenOffReason = document.getElementById('takenOffReason');
            if (takenOffReason) {
                takenOffReason.style.display = this.value === 'TakenOff' ? 'block' : 'none';
            }
        });
    });

    // ==================== FIXED: SIDEBAR LOADER ====================
    async function loadSidebar() {
        try {
            // sidebar.js ka loadSidebar function call karo
            if (typeof window.loadSidebar === 'function') {
                window.loadSidebar(); // ✅ YEH SAHI HAI
            } else {
                console.warn('loadSidebar function not found in sidebar.js');

                // Fallback: sirf session.html load karo
                const response = await fetch('/session.html');
                const html = await response.text();
                document.getElementById('sidebarContainer').innerHTML = html;

                // Logout button setup
                const logoutBtn = document.querySelector("#sidebarContainer #logoutBtn");
                if (logoutBtn) {
                    logoutBtn.addEventListener("click", () => {
                        sessionStorage.clear();
                        window.location.replace("/login.html");
                    });
                }
            }
        } catch (error) {
            console.error('Error loading sidebar:', error);
        }
    }

    // Load sidebar when page loads
    document.addEventListener("DOMContentLoaded", function() {
        console.log('✅ DOM loaded');
        loadSidebar();
    });
</script>

</body>
</html>
