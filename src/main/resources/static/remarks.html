<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Course Remarks Update</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: "Inter", sans-serif;
            background: #f1f3f5;
            margin: 0;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .nav-item {
            display: block;
            padding: 10px 0;
            color: white;
            text-decoration: none;
        }

        .nav-item.active {
            font-weight: 700;
        }

        /* Main */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: white;
            padding: 20px;
            border-bottom: 1px solid #ddd;
        }

        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        /* Card */
        .form-card {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .section {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .section-title {
            font-weight: 600;
            margin-bottom: 12px;
            border-bottom: 1px solid #ccc;
            padding-bottom: 5px;
        }

        textarea {
            width: 100%;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
            min-height: 70px;
            font-family: "Inter", sans-serif;
            box-sizing: border-box;
        }

        .radio-group {
            display: flex;
            gap: 20px;
        }

        .btn-primary {
            background: #1b4332;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-family: "Inter", sans-serif;
            font-weight: 600;
        }

        .btn-primary:hover {
            background: #2d6a4f;
        }

        /* Search styles */
        #personnelSearch {
            width: 100%;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-family: "Inter", sans-serif;
            box-sizing: border-box;
        }

        .recommendation-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 1000;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .recommendation-item {
            padding: 10px 12px;
            cursor: pointer;
            border-bottom: 1px solid #f3f4f6;
        }

        .recommendation-item:hover {
            background: #f3f4f6;
        }

        .recommendation-item .army-no {
            font-weight: 600;
            color: #1b4332;
        }

        .recommendation-loading {
            padding: 10px 12px;
            text-align: center;
            color: #6b7280;
        }

        #selectedPersonnelInfo {
            margin-top: 10px;
            padding: 8px;
            background: #e8f0fe;
            border-radius: 5px;
            display: none;
            border-left: 3px solid #1b4332;
        }

        .search-container {
            position: relative;
            width: 100%;
        }

        /* Course dropdown styles */
        #courseSelect {
            width: 100%;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-family: "Inter", sans-serif;
            box-sizing: border-box;
            margin-top: 5px;
        }

        #courseSelect:focus {
            outline: none;
            border-color: #1b4332;
        }

        /* Loading indicator */
        .loading-courses {
            text-align: center;
            padding: 10px;
            color: #666;
            font-style: italic;
        }

        .error-message {
            color: #dc3545;
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            border-radius: 4px;
            padding: 8px;
            margin-top: 5px;
            font-size: 14px;
        }

        /* History section styles */
        .history-section {
            margin-top: 20px;
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .history-table th,
        .history-table td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
            vertical-align: top;
        }

        .history-table th {
            background-color: #f8f9fa;
            font-weight: 600;
            color: #495057;
        }

        .history-table tr:hover {
            background-color: #f5f5f5;
        }

        /* Column widths */
        .history-table th:nth-child(1),
        .history-table td:nth-child(1) {
            width: 15%;
        }

        .history-table th:nth-child(2),
        .history-table td:nth-child(2) {
            width: 40%;
        }

        .history-table th:nth-child(3),
        .history-table td:nth-child(3) {
            width: 25%;
        }

        .history-table th:nth-child(4),
        .history-table td:nth-child(4) {
            width: 20%;
        }

        .history-loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        .remark-type-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
        }

        .remark-type-General {
            background-color: #e9ecef;
            color: #495057;
        }

        .remark-type-Volunteer {
            background-color: #d4edda;
            color: #155724;
        }

        .remark-type-NotDetail {
            background-color: #fff3cd;
            color: #856404;
        }

        .remark-type-Continuing {
            background-color: #cce5ff;
            color: #004085;
        }

        .remark-type-TakenOff {
            background-color: #f8d7da;
            color: #721c24;
        }
    </style>

    <link rel="stylesheet" href="sidebar.css">
</head>

<body>

<div class="container">
    <script src="sidebar.js"></script>
    <aside class="sidebar" id="sidebarContainer">
        <div style="color: white; padding: 20px; text-align: center;">
            Loading menu...
        </div>
    </aside>

    <!-- MAIN -->
    <main class="main-content">
        <div class="content-area">
            <div class="form-card">
                <div class="header">
                    <h2>Course Remarks Update</h2>
                    <p>Update remarks before and after course detailment</p>
                </div>

                <!-- SELECT PERSONNEL -->
                <div class="section">
                    <div class="section-title">Select Personnel</div>
                    <div class="search-container">
                        <input
                                type="text"
                                id="personnelSearch"
                                placeholder="Search by Army Number (min 4 characters)..."
                                autocomplete="off"
                        >
                        <div id="searchResults" class="recommendation-dropdown" style="display: none;"></div>
                    </div>
                    <div id="selectedPersonnelInfo"></div>
                    <input type="hidden" id="selectedPersonnelId">
                </div>

                <!-- COURSE DETAILMENT STATUS -->
                <div class="section">
                    <div class="section-title">Course Detailment Status</div>
                    <div class="radio-group">
                        <label>
                            <input type="radio" name="status" value="Volunteer">
                            Volunteer
                        </label>
                        <label>
                            <input type="radio" name="status" value="NotDetail">
                            Not to Detail
                        </label>
                    </div>
                </div>

                <!-- COURSE SELECTION -->
                <div class="section">
                    <div class="section-title">Select Course</div>
                    <select id="courseSelect">
                        <option value="">-- Select Course --</option>
                    </select>
                    <div id="courseLoading" class="loading-courses" style="display: none;">Loading courses...</div>
                    <div id="courseError" class="error-message" style="display: none;"></div>
                </div>

                <!-- GENERAL REMARK - SINGLE TEXTAREA FOR ALL REMARKS -->
                <div class="section">
                    <div class="section-title">General/Detailment Remarks</div>
                    <textarea id="generalRemarks" placeholder="Enter any remarks or reason here..."></textarea>
                </div>

                <div style="text-align:right;">
                    <button class="btn-primary" onclick="saveRemarks()">Update Remarks</button>
                </div>

                <!-- COURSE REMARKS HISTORY SECTION -->
                <div class="history-section section">
                    <div class="section-title">Course Remarks History</div>
                    <div id="historyContainer"></div>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    // ==================== CONFIGURATION ====================
    const BASE_URL = "http://localhost:6060";
    const SEARCH_API = `${BASE_URL}/api/personnel/search`;
    const REMARKS_API = `${BASE_URL}/api/remarks/save`;
    const REMARKS_HISTORY_API = `${BASE_URL}/api/remarks/history`;
    const COURSE_API = `${BASE_URL}/api/course`;

    // ==================== DOM ELEMENTS ====================
    const searchInput = document.getElementById('personnelSearch');
    const searchResults = document.getElementById('searchResults');
    const selectedPersonnelInfo = document.getElementById('selectedPersonnelInfo');
    const selectedPersonnelId = document.getElementById('selectedPersonnelId');
    const courseSelect = document.getElementById('courseSelect');
    const statusRadios = document.querySelectorAll('input[name="status"]');
    const generalRemarks = document.getElementById('generalRemarks');
    const courseLoading = document.getElementById('courseLoading');
    const courseError = document.getElementById('courseError');
    const historyContainer = document.getElementById('historyContainer');

    // ==================== STATE ====================
    let selectedPersonnel = null;
    let searchTimeout = null;
    let abortController = null;
    let courses = [];

    // ==================== DISPLAY HISTORY TABLE WITH HEADERS ====================
    function getHistoryTableHTML() {
        return `
            <table class="history-table">
                <thead>
                    <tr>
                        <th>Remark Type</th>
                        <th>Remarks</th>
                        <th>Course Name</th>
                        <th>Date & Time</th>
                    </tr>
                </thead>
                <tbody id="historyTableBody">
                </tbody>
            </table>
        `;
    }

    // ==================== LOAD COURSES FROM API ====================
    async function loadCourses() {
        try {
            courseSelect.style.display = 'none';
            courseLoading.style.display = 'block';
            courseError.style.display = 'none';

            console.log('📚 Loading courses from API...');

            const response = await fetch(COURSE_API, {
                method: 'GET',
                headers: {
                    'Content-Type': 'application/json',
                }
            });

            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }

            const data = await response.json();
            console.log('📦 Courses received:', data);

            courses = data;

            courseLoading.style.display = 'none';
            courseSelect.style.display = 'block';

            populateCourseDropdown(courses);

        } catch (error) {
            console.error('❌ Error loading courses:', error);

            courseLoading.style.display = 'none';
            courseError.style.display = 'block';
            courseError.textContent = `Failed to load courses: ${error.message}`;

            courseSelect.style.display = 'block';
            courseSelect.innerHTML = '<option value="">-- Error loading courses --</option>';
        }
    }

    function populateCourseDropdown(courses) {
        courseSelect.innerHTML = '<option value="">-- Select Course --</option>';

        if (courses && courses.length > 0) {
            courses.forEach(course => {
                const option = document.createElement('option');
                option.value = course.srno || course.id;

                let displayText = course.courseName;
                if (course.duration) {
                    displayText += ` (${course.duration} weeks)`;
                }
                if (course.location) {
                    displayText += ` - ${course.location}`;
                }

                option.textContent = displayText;
                courseSelect.appendChild(option);
            });
            console.log(`✅ Loaded ${courses.length} courses`);
        } else {
            courseSelect.innerHTML = '<option value="">-- No courses available --</option>';
        }
    }

    // ==================== LOAD REMARKS HISTORY ====================
    async function loadRemarksHistory(personnelId) {
        if (!personnelId) {
            // Show empty table with headers
            historyContainer.innerHTML = getHistoryTableHTML();
            const tbody = document.getElementById('historyTableBody');
            if (tbody) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align: center;">Select a personnel to view their remark history</td></tr>';
            }
            return;
        }

        try {
            // Show loading state with table headers
            historyContainer.innerHTML = getHistoryTableHTML();
            const tbody = document.getElementById('historyTableBody');
            if (tbody) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align: center;" class="history-loading">Loading remark history...</td></tr>';
            }

            console.log(`📜 Fetching remarks history for personnel ID: ${personnelId}`);

            const response = await fetch(`${REMARKS_HISTORY_API}/${personnelId}`, {
                method: 'GET',
                headers: {
                    'Content-Type': 'application/json',
                }
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.message || `HTTP error! status: ${response.status}`);
            }

            const result = await response.json();
            console.log('📜 History response:', result);

            if (result.success && result.data && result.data.length > 0) {
                displayRemarksHistoryData(result.data);
            } else {
                const tbody = document.getElementById('historyTableBody');
                if (tbody) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align: center;">No remarks history found for this personnel</td></tr>';
                }
            }

        } catch (error) {
            console.error('❌ Error loading remarks history:', error);
            const tbody = document.getElementById('historyTableBody');
            if (tbody) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align: center; color: #dc3545;">Failed to load history: ${error.message}</td></tr>`;
            }
        }
    }

    function displayRemarksHistoryData(historyData) {
        const tbody = document.getElementById('historyTableBody');
        if (!tbody) return;

        let html = '';

        historyData.forEach(record => {
            // Format date
            const date = new Date(record.createdAt);
            const formattedDate = date.toLocaleString('en-IN', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                hour12: true
            });

            // Course name with fallback to '-'
            const courseName = record.courseName && record.courseName !== '' ? record.courseName : '-';

            // Remark type with badge
            const remarkTypeClass = `remark-type-${record.remarkType}`;

            html += `
                <tr>
                    <td>
                        <span class="remark-type-badge ${remarkTypeClass}">${escapeHtml(record.remarkType)}</span>
                    </td>
                    <td>${escapeHtml(record.generalRemarks || '-')}</td>
                    <td>${escapeHtml(courseName)}</td>
                    <td style="white-space: nowrap;">${formattedDate}</td>
                </tr>
            `;
        });

        tbody.innerHTML = html;
    }

    // Helper function to escape HTML
    function escapeHtml(text) {
        if (!text) return text;
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // ==================== SEARCH FUNCTION ====================
    if (searchInput) {
        searchInput.addEventListener("input", (e) => {
            const searchTerm = e.target.value.trim();
            selectedPersonnelId.value = "";
            selectedPersonnel = null;

            clearTimeout(searchTimeout);

            if (searchTerm.length < 4) {
                searchResults.style.display = "none";
                selectedPersonnelInfo.style.display = "none";
                // Show empty table when no personnel selected
                historyContainer.innerHTML = getHistoryTableHTML();
                const tbody = document.getElementById('historyTableBody');
                if (tbody) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align: center;">Select a personnel to view their remark history</td></tr>';
                }
                return;
            }

            searchTimeout = setTimeout(() => {
                searchPersonnel(searchTerm);
            }, 500);
        });
    }

    async function searchPersonnel(term) {
        if (abortController) abortController.abort();
        abortController = new AbortController();

        try {
            searchResults.innerHTML = '<div class="recommendation-loading">Searching personnel...</div>';
            searchResults.style.display = "block";

            console.log('🔍 Searching for:', term);
            const response = await fetch(`${SEARCH_API}?term=${encodeURIComponent(term)}`, {
                signal: abortController.signal,
                headers: {
                    'Content-Type': 'application/json',
                }
            });

            const result = await response.json();
            console.log('📦 Search Response:', result);

            if (result.success && result.data && result.data.length > 0) {
                displaySearchResults(result.data);
            } else {
                searchResults.innerHTML = `
                    <div class="recommendation-loading" style="color: #ef4444;">
                        ⚠️ No personnel found with Army No: "${term}"
                    </div>
                `;
            }
        } catch (error) {
            if (error.name === "AbortError") return;
            console.error("Search error:", error);
            searchResults.style.display = "none";
        }
    }

    function displaySearchResults(personnelList) {
        let html = "";
        personnelList.forEach(person => {
            html += `
                <div class="recommendation-item" onclick="selectPersonnel(${person.id}, '${person.armyNo}', '${person.fullName}', '${person.rank || ''}')">
                    <div class="army-no">${person.armyNo}</div>
                    <div style="font-size: 12px; color: #4b5563;">${person.fullName} ${person.rank ? '- ' + person.rank : ''}</div>
                </div>
            `;
        });
        searchResults.innerHTML = html;
    }

    // ==================== SELECT PERSONNEL ====================
    window.selectPersonnel = function(personnelId, armyNo, fullName, rank) {
        console.log('✅ Selected:', {personnelId, armyNo, fullName, rank});

        searchInput.value = `${fullName} (${armyNo})`;
        selectedPersonnelId.value = personnelId;

        selectedPersonnel = {
            id: Number(personnelId),
            armyNo: armyNo,
            fullName: fullName,
            rank: rank
        };

        searchResults.style.display = "none";

        selectedPersonnelInfo.style.display = "block";
        selectedPersonnelInfo.innerHTML = `
            <strong>Selected:</strong> ${fullName} (${armyNo}) ${rank ? '- ' + rank : ''}
        `;

        // Load remarks history for selected personnel
        loadRemarksHistory(selectedPersonnel.id);
    };

    // ==================== CLICK OUTSIDE ====================
    document.addEventListener("click", (e) => {
        if (searchInput && !searchInput.contains(e.target) && searchResults && !searchResults.contains(e.target)) {
            searchResults.style.display = "none";
        }
    });

    // ==================== SAVE REMARKS ====================
    window.saveRemarks = function() {
        // Validate personnel selection
        if (!selectedPersonnel) {
            alert("Please select personnel");
            return;
        }

        // Get selected status (radio button value)
        const selectedStatus = document.querySelector('input[name="status"]:checked');
        let remarkType = "General";

        if (selectedStatus) {
            remarkType = selectedStatus.value;
        }

        // Validate course selection
        const selectedCourseId = courseSelect.value;
        if (!selectedCourseId) {
            alert("Please select a course");
            return;
        }

        // Get selected course details
        const selectedCourse = courses.find(c => (c.srno == selectedCourseId || c.id == selectedCourseId));

        // Get general remarks
        const remarks = generalRemarks.value.trim();

        const payload = {
            personnelId: selectedPersonnel.id,
            remarkType: remarkType,
            generalRemarks: remarks,
            courseId: parseInt(selectedCourseId),
            courseName: selectedCourse ? selectedCourse.courseName : ''
        };

        console.log("📤 Sending payload:", payload);

        fetch(REMARKS_API, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
            },
            body: JSON.stringify(payload)
        })
        .then(res => {
            if (!res.ok) {
                throw new Error(`HTTP error! status: ${res.status}`);
            }
            return res.json();
        })
        .then(data => {
            if (data.success) {
                alert("Remarks saved successfully ✅");
                console.log("✅ Saved:", data);
                clearForm();
                if (selectedPersonnel) {
                    loadRemarksHistory(selectedPersonnel.id);
                }
            } else {
                throw new Error(data.message || "Failed to save remarks");
            }
        })
        .catch(error => {
            console.error("❌ Error:", error);
            alert("Error saving remarks: " + error.message);
        });
    };

    // ==================== CLEAR FORM ====================
    function clearForm() {
        statusRadios.forEach(r => r.checked = false);
        courseSelect.value = '';
        if (generalRemarks) generalRemarks.value = '';
    }

    // ==================== INITIALIZE HISTORY TABLE ====================
    function initializeHistoryTable() {
        historyContainer.innerHTML = getHistoryTableHTML();
        const tbody = document.getElementById('historyTableBody');
        if (tbody) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align: center;">Select a personnel to view their remark history</td></tr>';
        }
    }

    // ==================== SIDEBAR LOADER ====================
    async function loadSidebar() {
        try {
            if (typeof window.loadSidebar === 'function') {
                window.loadSidebar();
            } else {
                const response = await fetch('/session.html');
                const html = await response.text();
                document.getElementById('sidebarContainer').innerHTML = html;

                const logoutBtn = document.querySelector("#sidebarContainer #logoutBtn");
                if (logoutBtn) {
                    logoutBtn.addEventListener("click", () => {
                        sessionStorage.clear();
                        window.location.replace("/login.html");
                    });
                }
            }
        } catch (error) {
            console.error('Error loading sidebar:', error);
        }
    }

    // Load everything when page loads
    document.addEventListener("DOMContentLoaded", function() {
        console.log('✅ DOM loaded');
        loadSidebar();
        loadCourses();
        initializeHistoryTable();
    });
</script>

</body>
</html>
