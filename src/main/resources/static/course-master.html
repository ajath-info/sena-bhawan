<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Course Master - ARMY HRMS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: "Inter", sans-serif;
      background: #f1f3f5;
      color: #1f2937;
    }

    .container {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ================= SIDEBAR ================= */
    .sidebar {
      width: 256px;
      background: linear-gradient(180deg, #1b4332 0%, #081c15 100%);
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow-y: auto;
      overflow-x: hidden;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      min-height: 72px;
    }

    .logo-section {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: #ffb703;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    .logo-text h1 {
      font-size: 18px;
      font-weight: 700;
    }

    .logo-text p {
      font-size: 11px;
      color: #52b788;
    }

    .sidebar-nav {
      flex: 1;
      padding: 16px 0;
    }

    .nav-section-title {
      padding: 16px 20px 8px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      color: #52b788;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      color: white;
      text-decoration: none;
      border-left: 4px solid transparent;
    }

    .nav-item.active {
      background: rgba(255,255,255,0.1);
      border-left-color: #ffb703;
      font-weight: 600;
    }

    .nav-icon {
      font-size: 18px;
    }

    .sidebar-footer {
      padding: 16px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .user-profile {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #2d6a4f;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
    }

    .user-info .name {
      font-size: 14px;
      font-weight: 600;
    }

    .user-info .role {
      font-size: 12px;
      color: #52b788;
    }


    /* ================= MAIN CONTENT ================= */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .header {
      background: white;
      border-bottom: 1px solid #e5e7eb;
      padding: 16px 24px;
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .header-left h2 {
      font-size: 22px;
      font-weight: 700;
    }

    .header-left p {
      font-size: 14px;
      color: #6b7280;
      margin-top: 4px;
    }

    .search-box input {
      width: 240px;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      font-size: 14px;
    }

    .search-box input:focus {
      outline: none;
      border-color: #1b4332;
      box-shadow: 0 0 0 3px rgba(27, 67, 50, 0.1);
    }

    .content-area {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      background: #f1f3f5;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      border: 1px solid #e5e7eb;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .badge {
      background: #d1fae5;
      color: #065f46;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
    }

    .btn-primary {
      background: #1b4332;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
    }

    th {
      font-size: 12px;
      text-transform: uppercase;
      color: #6b7280;
      background: #f9fafb;
    }

    .actions {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      border: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .icon-btn.edit { color: #3b82f6; border-color: #3b82f6; }
    .icon-btn.delete { color: #ef4444; border-color: #ef4444; }

  </style>

  <link rel="stylesheet" href="sidebar.css">
</head>

<body>
<script src="auth.js"></script>
<script src="logout.js"></script>
<script src="sidebar.js"></script>
<div class="container">

  <!-- SIDEBAR CONTAINER - This will be populated by sidebar.js -->
  <aside class="sidebar" id="sidebarContainer">
    <!-- Loading indicator (optional) -->
    <div style="color: white; padding: 20px; text-align: center;">
      Loading menu...
    </div>
  </aside>

  <main class="main-content">
    <header class="header">
      <div class="header-left">
        <h2>Course Master</h2>
        <p>Manage Course Information</p>
      </div>

      <div class="header-right">
        <div class="search-box">
          <input type="text" placeholder="Search courses..." />
        </div>
      </div>
    </header>

    <div class="content-area">
      <div class="card">

        <div class="card-header">
          <span id="courseCount" class="badge">0 Courses</span>
          <button class="btn-primary" onclick="openAddCourse()">+ Add Course</button>
        </div>

        <table>
          <thead>
          <tr>
            <th>S.No</th>
            <th>Course Name</th>
            <th>Location</th>
            <th>Duration (Weeks)</th>
            <th>Actions</th>
          </tr>
          </thead>

          <tbody id="courseTable">
          <tr><td colspan="5">Loading...</td></tr>
          </tbody>
        </table>

      </div>
    </div>

  </main>
</div>



<!-- ============= API SCRIPT =============== -->
<script>

  const tableBody = document.getElementById("courseTable");
  const courseCountEl = document.getElementById("courseCount");

  const API = "http://localhost:6060/api/course";

  window.onload = () => {
    loadCourseCount();
    loadCourseList();
  };

  /* ========== LOAD COURSE COUNT ========== */
  function loadCourseCount() {
    fetch(API + "/count")
      .then(res => res.json())
      .then(count => {
        courseCountEl.textContent = count + " Courses";
      })
      .catch(() => {
        courseCountEl.textContent = "0 Courses";
      });
  }


  /* ========== LOAD COURSE LIST ========== */
  function loadCourseList() {
    fetch(API)
      .then(res => res.json())
      .then(data => {
        tableBody.innerHTML = "";

        if (!data || data.length === 0) {
          tableBody.innerHTML = `<tr><td colspan="5">No courses found</td></tr>`;
          return;
        }

        data.forEach((course, index) => {
          tableBody.innerHTML += `
            <tr>
              <td>${index + 1}</td>
              <td>${course.courseName || "-"}</td>
              <td>${course.location || "-"}</td>
              <td>${course.duration || "-"}</td>
              <td class="actions">
                <div class="icon-btn edit" onclick="editCourse(${course.srno})">✏️</div>
                <div class="icon-btn delete" onclick="deleteCourse(${course.srno})">🗑️</div>
              </td>
            </tr>
          `;
        });
      })
      .catch(err => {
        tableBody.innerHTML = `<tr><td colspan="5">Failed to load courses</td></tr>`;
      });
  }



  /* ========== DELETE COURSE ========== */
  function deleteCourse(srno) {
    if (!confirm("Are you sure you want to delete this course?")) return;

    fetch(`${API}/${srno}`, { method: "DELETE" })
      .then(res => {
        if (!res.ok) {
          alert("Failed to delete course");
          return;
        }
        alert("Course deleted successfully");
        loadCourseList();
        loadCourseCount();
      })
      .catch(() => alert("Server error while deleting"));
  }



  /* ========== EDIT COURSE ========== */
  function editCourse(srno) {
    const newName = prompt("Enter new Course Name:");
    const newLocation = prompt("Enter new Location:");
    const newDuration = prompt("Enter new Duration (weeks):");

    if (!newName || !newLocation || !newDuration) {
      alert("All fields are required!");
      return;
    }

    const payload = {
      courseName: newName,
      location: newLocation,
      duration: newDuration
    };

    fetch(`${API}/${srno}`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    })
      .then(res => res.json())
      .then(() => {
        alert("Course updated successfully");
        loadCourseList();
      })
      .catch(() => alert("Failed to update course"));
  }



  /* ========== ADD COURSE REDIRECT ========== */
  function openAddCourse() {
    window.location.href = "/addcourse.html";
  }


  /* ========== HIGHLIGHT ACTIVE MENU ========== */
  (function () {
    const currentPage = location.pathname.split('/').pop();
    const menuLinks = document.querySelectorAll('.sidebar-nav a');

    menuLinks.forEach(link => {
      const linkPath = link.getAttribute('href').split('/').pop();
      if (currentPage === linkPath) {
        link.classList.add('active');
      }
    });
  })();
</script>

</body>
</html>
